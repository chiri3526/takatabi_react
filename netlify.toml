[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy-Report-Only = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' https://platform.twitter.com https://pagead2.googlesyndication.com https://www.googletagservices.com https://googleads.g.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://platform.twitter.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://images.microcms-assets.io https://*.microcms-assets.io https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://*.googleusercontent.com https://*.twimg.com; frame-src 'self' https://platform.twitter.com https://syndication.twitter.com https://googleads.g.doubleclick.net; connect-src 'self' https://*.microcms.io https://pagead2.googlesyndication.com"

[[redirects]]
  from = "/articles/*"
  to = "/404/"
  status = 404

[[redirects]]
  from = "/categories/*"
  to = "/404/"
  status = 404

[[redirects]]
  from = "/*"
  to = "/404/"
  status = 404

